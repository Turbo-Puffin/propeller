default: &default
  adapter: postgresql
  encoding: unicode
  max_connections: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  url: <%= ENV.fetch("DATABASE_URL", nil) %>

development:
  <<: *default
  database: propeller_development
  url: <%= ENV.fetch("DATABASE_URL", "postgresql://localhost/propeller_development") %>

test:
  <<: *default
  database: propeller_test

production:
  primary: &primary_production
    <<: *default
    url: <%= ENV["DATABASE_URL"] %>
  cache:
    <<: *primary_production
    database: propeller_production_cache
    migrations_paths: db/cache_migrate
  queue:
    <<: *primary_production
    database: propeller_production_queue
    migrations_paths: db/queue_migrate
  cable:
    <<: *primary_production
    database: propeller_production_cable
    migrations_paths: db/cable_migrate
